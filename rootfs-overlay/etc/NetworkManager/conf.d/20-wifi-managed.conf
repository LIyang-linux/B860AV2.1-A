# B860AV2.1-A WiFi NetworkManager Configuration
# Ensures WiFi interfaces are managed by NetworkManager

[device]
# Disable MAC randomization for better compatibility with some routers
wifi.scan-rand-mac-address=no

[connection]
# Disable WiFi power saving for stability on TV box hardware
# (power save can cause disconnects on some cheap WiFi chips)
wifi.powersave=2

# Enable IPv4 by default, IPv6 auto
ipv4.method=auto
ipv6.method=auto
