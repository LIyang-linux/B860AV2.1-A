# B860AV2.1 U-Boot 救砖镜像 - GitHub Actions 自动编译工作流
#
# 使用方法：
#   1. Fork 仓库到自己的 GitHub 账号
#   2. 将原厂 fip_backup.img 放入仓库根目录（或通过 Actions 界面上传）
#   3. 进入 Actions 页面，选择 "Build B860AV2.1 U-Boot Recovery" 工作流
#   4. 点击 "Run workflow" 运行
#   5. 编译完成后在 Artifacts 下载镜像文件
#
# 注意：原厂 fip_backup.img 需要单独上传，不可提交到公开仓库
#       可通过 workflow_dispatch 时的 input 参数指定

name: Build B860AV2.1 U-Boot Recovery

on:
  workflow_dispatch:
    inputs:
      uboot_version:
        description: 'U-Boot 版本标签'
        required: true
        default: 'v2025.04'
        type: string

  push:
    branches: [ main, master ]
    paths:
      - 'fip_backup.img'
      - '.github/workflows/build-uboot-recovery.yml'

env:
  UBOOT_VERSION: ${{ github.event.inputs.uboot_version || 'v2025.04' }}

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            gcc-aarch64-linux-gnu make bc bison flex libssl-dev python3 \
            python3-dev python3-setuptools swig g++ device-tree-compiler git wget cpio \
            libgnutls28-dev qemu-user

      - name: Clone gxlimg
        run: |
          git clone --depth=1 https://github.com/repk/gxlimg.git
          cd gxlimg && make

      - name: Download aml_image_v2_packer
        run: |
          wget -q -O aml_image_v2_packer \
            "https://github.com/jethome-ru/jethome-tools/raw/convert/tools/aml_image_v2_packer_new"
          chmod +x aml_image_v2_packer

      - name: Download and build U-Boot
        run: |
          UBOOT_VER="${{ env.UBOOT_VERSION }}"
          echo "Building U-Boot ${UBOOT_VER}"
          wget -q -O u-boot.tar.gz "https://github.com/u-boot/u-boot/archive/refs/tags/${UBOOT_VER}.tar.gz"
          tar xzf u-boot.tar.gz
          mv "u-boot-$(echo ${UBOOT_VER} | sed 's/v//')" u-boot

          cd u-boot
          export ARCH=arm
          export CROSS_COMPILE=aarch64-linux-gnu-
          make p212_defconfig
          make -j$(nproc)
          ls -lh u-boot.bin

      - name: Check fip_backup.img
        id: check_fip
        run: |
          if [ -f fip_backup.img ]; then
            echo "found=true" >> $GITHUB_OUTPUT
            echo "fip_backup.img found in repository"
            ls -lh fip_backup.img
          else
            echo "found=false" >> $GITHUB_OUTPUT
            echo "WARNING: fip_backup.img not found - will use p212 FIP blobs as fallback"
          fi

      - name: Extract BL components from fip_backup
        if: steps.check_fip.outputs.found == 'true'
        run: |
          mkdir -p fip-extracted
          dd if=fip_backup.img of=/tmp/boot_region.bin bs=512 skip=1 2>/dev/null
          ./gxlimg/gxlimg -t fip -e /tmp/boot_region.bin fip-extracted
          ls -la fip-extracted/

      - name: Repack FIP with mainline U-Boot (original BL blobs)
        if: steps.check_fip.outputs.found == 'true'
        run: |
          # 加密主线 U-Boot 为 BL33
          ./gxlimg/gxlimg -t bl3x -c u-boot/u-boot.bin fip-extracted/u-boot.bin.enc

          # 用原厂 BL2/BL30/BL31 + 主线 U-Boot 重新打包
          ./gxlimg/gxlimg -t fip \
            --bl2 fip-extracted/bl2.sign \
            --bl30 fip-extracted/bl30.enc \
            --bl301 fip-extracted/bl301.enc \
            --bl31 fip-extracted/bl31.enc \
            --bl33 fip-extracted/u-boot.bin.enc \
            b860av21-uboot-recovery.bin

          ls -lh b860av21-uboot-recovery.bin

      - name: Fallback: Build FIP with p212 blobs
        if: steps.check_fip.outputs.found == 'false'
        run: |
          echo "No fip_backup.img found, using p212 GXL FIP blobs as fallback"
          echo "WARNING: This may cause 'wrong chip id' if BL30 doesn't match your SoC"
          git clone --depth=1 https://github.com/LibreELEC/amlogic-boot-fip.git
          mkdir -p fip-output-gxl
          cd amlogic-boot-fip
          bash build-fip.sh p212 $(pwd)/../u-boot/u-boot.bin $(pwd)/../fip-output-gxl
          cd ..
          cp fip-output-gxl/u-boot.bin b860av21-uboot-recovery.bin
          ls -lh b860av21-uboot-recovery.bin

      - name: Generate USB burn components
        run: |
          # GXL FIP: BL2 at offset 0, TPL at offset 49152 (0xC000)
          dd if=b860av21-uboot-recovery.bin of=DDR.USB bs=1 count=49152 2>/dev/null
          dd if=b860av21-uboot-recovery.bin of=UBOOT.USB bs=1 skip=49152 2>/dev/null
          ls -lh DDR.USB UBOOT.USB

      - name: Pack Amlogic USB Burning Tool image
        run: |
          mkdir -p burn-image
          cp DDR.USB burn-image/
          cp UBOOT.USB burn-image/
          cp b860av21-uboot-recovery.bin burn-image/bootloader.PARTITION

          cat > burn-image/aml_sdc_burn.ini << 'EOF'
;
;Amlogic sdcard burning configure script
;
[common]
erase_bootloader    = 1
erase_flash         = 1
reboot              = 0

[burn_ex]
package     = aml_upgrade_package.img
;media       =
EOF

          cat > burn-image/platform.conf << 'EOF'
Platform: gxl
DDRLoad: 0xd9000000
DDRRun: 0xd9000030
Uboot_down: 0x10000000
Uboot_decomp: 0x10000000
Uboot_enc_down: 0xd9000000
Uboot_enc_run: 0xd9000030
UbootLoad: 0x10000000
UbootRun: 0x10000000
EOF

          cat > burn-image/image.cfg << 'EOF'
[LIST_NORMAL]
file="DDR.USB"			main_type="USB"		sub_type="DDR"
file="UBOOT.USB"		main_type="USB"		sub_type="UBOOT"
file="aml_sdc_burn.ini"		main_type="ini"		sub_type="aml_sdc_burn"
file="platform.conf"		main_type="conf"	sub_type="platform"

[LIST_VERIFY]
file="bootloader.PARTITION"	main_type="PARTITION"	sub_type="bootloader"
EOF

          qemu-i386 aml_image_v2_packer -r burn-image/image.cfg burn-image b860av21-uboot-recovery-burn.img
          ls -lh b860av21-uboot-recovery-burn.img

      - name: Prepare artifacts
        run: |
          mkdir -p artifacts
          cp b860av21-uboot-recovery-burn.img artifacts/
          cp b860av21-uboot-recovery.bin artifacts/
          cp u-boot/u-boot.bin artifacts/u-boot.bin
          cp DDR.USB artifacts/
          cp UBOOT.USB artifacts/

          # 生成校验文件
          cd artifacts
          md5sum * > checksums.md5
          cat checksums.md5
          ls -lh

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: b860av21-uboot-recovery-${{ env.UBOOT_VERSION }}
          path: artifacts/
          retention-days: 30
          compression-level: 0
