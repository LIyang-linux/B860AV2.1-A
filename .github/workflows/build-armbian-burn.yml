# B860AV2.1-A Armbian 线刷镜像 - 全自动构建工作流 (V6.4)
#
# 功能：
#   1. 编译主线 U-Boot v2025.04 (p212_defconfig, GXL)
#   2. 从原厂 fip_backup.img 提取 BL2/BL30/BL31 + 原厂 DDR.USB/UBOOT.USB
#   3. 用 gxlimg 重新打包 FIP (原厂 BL + 主线 U-Boot)
#   4. 下载 ophub S905L3-B Armbian 镜像 (V6.3: 6.1.y 回退到仓库 Release 存档)
#   5. 提取 boot 分区 (内核 + DTB + initramfs + 引导脚本)
#   6. 创建 64MB FAT32 boot.PARTITION (V3: e900v22e DTB; V6.2: logo 压缩至 2.6MB 以适配)
#   7. V6.3: 内核升级 — 用 deb-6.1.177 替换镜像内核为最新 6.1.y LTS
#   8. 提取并缩小 rootfs ext4 为 system.PARTITION
#   9. V3-V5: 注入网络可靠性脚本 + UUID修复 + tune2fs优化 + 首启检查 + DTB定制
#  10. V6: 内置 WiFi 固件 (SSV6051) + WiFi 自动检测脚本 + 连接助手
#  11. V6.1: 锁定内核 6.1.y LTS + 版本号带日期标签
#  12. V6.2: U-Boot 启动 Logo (BMP) 消除黑屏 + boot.scr 引导脚本
#  13. V6.3: 内核来源回退 (ophub 已移除 6.1.y, 改用仓库 Release 存档 + deb 包升级)
#  14. V6.4: GPU 加速 — Mali-450 lima 驱动 + Mesa 用户空间驱动内置
#  15. 打包完整 Amlogic 线刷镜像 (bootloader + boot + rootfs)
#  16. 上传 Artifact 和 Release
#
# 使用方法：
#   方式 1 (手动触发): Actions → Build Armbian Burn Image → Run workflow
#   方式 2 (自动触发): push 到 main 分支且修改了相关文件
#
# fip_backup.img 来源 (按优先级):
#   1. 仓库根目录 fip_backup.img
#   2. Release "fip-backup" 的 asset
#   3. Secret "FIP_BACKUP_B64" (base64 编码)

name: Build Armbian Burn Image

on:
  workflow_dispatch:
    inputs:
      uboot_version:
        description: 'U-Boot 版本标签'
        required: true
        default: 'v2025.04'
        type: string
      ophub_soc:
        description: 'ophub SoC 类型'
        required: true
        default: 's905l3b'
        type: choice
        options:
          - s905l3b
          - s905l3
          - s905l2
      ophub_image_url:
        description: 'ophub 镜像直链 (空则自动查找最新)'
        required: false
        default: ''
        type: string
      kernel_version:
        description: '锁定内核版本 (如 6.1, 6.6, 留空则用最新)'
        required: false
        default: '6.1'
        type: string
      create_release:
        description: '完成后创建 Release'
        required: true
        default: true
        type: boolean

  push:
    branches: [ main ]
    paths:
      - '.github/workflows/build-armbian-burn.yml'
      - 'scripts/build-armbian.sh'
      - 'armbian-v2/image.cfg'
      - 'rootfs-overlay/**'
      - 'assets/logo.bmp'

env:
  UBOOT_VERSION: ${{ github.event.inputs.uboot_version || 'v2025.04' }}
  OPHUB_SOC: ${{ github.event.inputs.ophub_soc || 's905l3b' }}
  KERNEL_VERSION: ${{ github.event.inputs.kernel_version || '6.1' }}
  BUILD_VERSION: 'v6.4'

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 60
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            gcc-aarch64-linux-gnu make bc bison flex libssl-dev python3 \
            python3-dev python3-setuptools swig g++ device-tree-compiler git wget cpio \
            libgnutls28-dev qemu-user qemu-user-static \
            mtools dosfstools e2fsprogs parted gzip \
            imagemagick u-boot-tools

      # ========== Logo 准备 ==========
      - name: Verify and prepare boot logo
        id: logo
        run: |
          set +e
          LOGO_SRC="assets/logo.bmp"
          if [ ! -f "$LOGO_SRC" ]; then
            echo "logo_status=skip" >> $GITHUB_OUTPUT
            echo "No assets/logo.bmp found, skipping logo integration"
            exit 0
          fi

          # 验证 BMP 格式
          BMP_INFO=$(file "$LOGO_SRC")
          echo "Logo file info: $BMP_INFO"

          # 目标规格: 1280x720 24-bit 无压缩 BMP3 (~2.6MB, 适配 64MB boot 分区)
          TARGET_W=1280
          TARGET_H=720
          TARGET_DEPTH=24

          if echo "$BMP_INFO" | grep -q "PC bitmap"; then
            # 已是 BMP 格式, 验证分辨率和色深
            DIMS=$(identify -format "%wx%h" "$LOGO_SRC" 2>/dev/null)
            DEPTH=$(identify -format "%[depth]" "$LOGO_SRC" 2>/dev/null)
            echo "BMP dimensions: $DIMS, depth: $DEPTH bit"
            W=$(echo "$DIMS" | cut -dx -f1)
            H=$(echo "$DIMS" | cut -dx -f2)
            # 如果分辨率或色深不符合, 或文件大于 3MB, 压缩转换
            LOGO_SIZE=$(stat -c%s "$LOGO_SRC" 2>/dev/null || echo 0)
            if [ "$W" != "$TARGET_W" ] || [ "$H" != "$TARGET_H" ] || [ "$DEPTH" != "$TARGET_DEPTH" ] || [ "$LOGO_SIZE" -gt 3145728 ]; then
              echo "Converting BMP to ${TARGET_W}x${TARGET_H} ${TARGET_DEPTH}-bit (size: ${LOGO_SIZE} bytes)..."
              convert "$LOGO_SRC" -resize ${TARGET_W}x${TARGET_H}! -depth ${TARGET_DEPTH} -type TrueColor -compress None BMP3:"${LOGO_SRC}.tmp"
              mv "${LOGO_SRC}.tmp" "$LOGO_SRC"
            fi
          else
            # 非 BMP 格式 (如 JPEG/PNG), 转换
            echo "Converting to U-Boot compatible BMP (${TARGET_W}x${TARGET_H}, ${TARGET_DEPTH}-bit, uncompressed)..."
            convert "$LOGO_SRC" -resize ${TARGET_W}x${TARGET_H}! -depth ${TARGET_DEPTH} -type TrueColor -compress None BMP3:"${LOGO_SRC}.tmp"
            mv "${LOGO_SRC}.tmp" "$LOGO_SRC"
          fi

          # 最终验证
          echo "=== Final logo format ==="
          file "$LOGO_SRC"
          identify "$LOGO_SRC" 2>/dev/null
          # 验证 BMP 头: 压缩字段 (offset 0x1E, 4 bytes) 必须为 0
          COMPRESS=$(xxd -s 30 -l 4 "$LOGO_SRC" 2>/dev/null | grep -oP '^\S+: \K\S+ \S+' | head -1)
          echo "BMP compression field: $COMPRESS"

          echo "logo_status=ready" >> $GITHUB_OUTPUT
          echo "Logo prepared successfully"

      # ========== 工具准备 ==========
      - name: Clone and build gxlimg
        run: |
          git clone --depth=1 https://github.com/repk/gxlimg.git
          cd gxlimg && make
          echo "$(pwd)" >> $GITHUB_PATH

      - name: Download aml_image_v2_packer
        run: |
          # 多源重试下载 aml_image_v2_packer
          URLS=(
            "https://github.com/jethome-ru/jethome-tools/raw/convert/tools/aml_image_v2_packer_new"
            "https://raw.githubusercontent.com/jethome-ru/jethome-tools/convert/tools/aml_image_v2_packer_new"
            "https://ghproxy.com/https://github.com/jethome-ru/jethome-tools/raw/convert/tools/aml_image_v2_packer_new"
          )
          for url in "${URLS[@]}"; do
            echo "Trying: $url"
            wget -q --timeout=30 -O aml_image_v2_packer "$url" && break
            echo "  Failed (exit: $?)"
          done
          if [ ! -s aml_image_v2_packer ]; then
            echo "ERROR: All download attempts failed for aml_image_v2_packer"
            exit 1
          fi
          chmod +x aml_image_v2_packer
          echo "$(pwd)" >> $GITHUB_PATH

      # ========== 获取 fip_backup.img ==========
      - name: Get fip_backup.img
        id: fip
        run: |
          if [ -f fip_backup.img ] && [ $(stat -c%s fip_backup.img) -gt 1000000 ]; then
            echo "Found fip_backup.img in repo"
            echo "source=repo" >> $GITHUB_OUTPUT
          else
            echo "Trying Release asset..."
            gh release download fip-backup -R "${{ github.repository }}" \
              -p "fip_backup.img" -D . || true
            if [ -f fip_backup.img ] && [ $(stat -c%s fip_backup.img) -gt 1000000 ]; then
              echo "Found fip_backup.img in Release"
              echo "source=release" >> $GITHUB_OUTPUT
            elif [ -n "${{ secrets.FIP_BACKUP_B64 }}" ]; then
              echo "Decoding from secret FIP_BACKUP_B64..."
              echo "${{ secrets.FIP_BACKUP_B64 }}" | base64 -d > fip_backup.img
              echo "source=secret" >> $GITHUB_OUTPUT
            else
              echo "ERROR: fip_backup.img not found!"
              echo "Please upload it to repo root, Release 'fip-backup', or Secret 'FIP_BACKUP_B64'"
              exit 1
            fi
          fi
          ls -lh fip_backup.img
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ========== 编译 U-Boot ==========
      - name: Cache U-Boot source
        id: cache-uboot
        uses: actions/cache@v4
        with:
          path: u-boot-src
          key: uboot-${{ env.UBOOT_VERSION }}-p212-video-v2

      - name: Download and build U-Boot
        if: steps.cache-uboot.outputs.cache-hit != 'true'
        run: |
          UBOOT_VER="${UBOOT_VERSION}"
          wget -q -O u-boot.tar.gz \
            "https://github.com/u-boot/u-boot/archive/refs/tags/${UBOOT_VER}.tar.gz"
          tar xzf u-boot.tar.gz
          mv "u-boot-$(echo ${UBOOT_VER} | sed 's/v//')" u-boot-src

          cd u-boot-src
          export ARCH=arm
          export CROSS_COMPILE=aarch64-linux-gnu-
          make p212_defconfig

          # V6.2: 启用视频和 BMP 显示支持 (p212_defconfig 默认不包含)
          # CONFIG_VIDEO         - 视频子系统基础 (DM Video)
          # CONFIG_VIDEO_MESON   - Amlogic Meson HDMI/VPU 驱动
          # CONFIG_DISPLAY       - 显示面板 uclass
          # CONFIG_CMD_BMP       - bmp display 命令
          # CONFIG_VIDEO_BPP32   - 32位色深支持 (BMP 24bit 需要)
          # CONFIG_VIDEO_BPP16   - 16位色深支持
          # CONFIG_VIDEO_BPP8    - 8位色深支持
          # CONFIG_SYS_WHITE_ON_BLACK - 黑底白字 (减少闪烁)
          ./scripts/config --enable VIDEO
          ./scripts/config --enable VIDEO_MESON
          ./scripts/config --enable DISPLAY
          ./scripts/config --enable CMD_BMP
          ./scripts/config --enable VIDEO_BPP32
          ./scripts/config --enable VIDEO_BPP16
          ./scripts/config --enable VIDEO_BPP8
          ./scripts/config --enable SYS_WHITE_ON_BLACK
          make olddefconfig

          # 验证关键配置已启用
          echo "=== Video/BMP config verification ==="
          grep -E "CONFIG_(VIDEO|CMD_BMP|DISPLAY)" .config || echo "WARNING: Video config not found!"

          make -j$(nproc)
          ls -lh u-boot.bin

          # 验证 bmp 命令已编译
          echo "=== Checking bmp command in U-Boot ==="
          strings u-boot.bin | grep -i "bmp" | head -5 || echo "WARNING: bmp command not found in binary!"

      - name: Copy U-Boot binary and check env config
        run: |
          cp u-boot-src/u-boot.bin .
          # V4: 检查 U-Boot env 配置, 确保 env offset 不与 boot/system 分区重叠
          echo "=== U-Boot env configuration ==="
          grep -E "CONFIG_ENV_(OFFSET|SIZE|IS_IN|NOWHERE)" u-boot-src/.config || echo "No env config found"
          ENV_OFFSET=$(grep -oP 'CONFIG_ENV_OFFSET=\K\S+' u-boot-src/.config || echo "0")
          ENV_SIZE=$(grep -oP 'CONFIG_ENV_SIZE=\K\S+' u-boot-src/.config || echo "0")
          echo "ENV_OFFSET=$ENV_OFFSET (bytes)"
          echo "ENV_SIZE=$ENV_SIZE (bytes)"
          # 转换为 MB 显示
          if [ "$ENV_OFFSET" != "0" ]; then
            ENV_OFFSET_MB=$((ENV_OFFSET / 1024 / 1024))
            echo "Env offset: ${ENV_OFFSET_MB}MB"
            if [ "$ENV_OFFSET_MB" -lt 100 ]; then
              echo "WARNING: U-Boot env at ${ENV_OFFSET_MB}MB may overlap with boot partition!"
              echo "  bootloader: 0-4MB, boot: ~36-100MB, env: ${ENV_OFFSET_MB}MB"
              echo "  If boot fails, consider CONFIG_ENV_IS_NOWHERE=y for fixed-config burn images"
            fi
          fi

      # ========== 提取 BL 组件并重打包 FIP ==========
      - name: Extract BL components and repack FIP
        run: |
          set -e
          mkdir -p fip-extracted

          # fip_backup.img 第1扇区是 MBR/EPT，跳过
          dd if=fip_backup.img of=/tmp/boot_region.bin bs=512 skip=1 2>/dev/null
          gxlimg -t fip -e /tmp/boot_region.bin fip-extracted
          echo "=== Extracted BL components ==="
          ls -la fip-extracted/

          # 加密主线 U-Boot 为 BL33
          gxlimg -t bl3x -c u-boot.bin fip-extracted/u-boot.bin.enc

          # 用原厂 BL2/BL30/BL31 + 主线 U-Boot 重新打包 FIP
          gxlimg -t fip \
            --bl2 fip-extracted/bl2.sign \
            --bl30 fip-extracted/bl30.enc \
            --bl301 fip-extracted/bl301.enc \
            --bl31 fip-extracted/bl31.enc \
            --bl33 fip-extracted/u-boot.bin.enc \
            bootloader.PARTITION

          echo "=== FIP (bootloader.PARTITION) ==="
          ls -lh bootloader.PARTITION

          # 从原厂 fip_backup 提取 DDR.USB 和 UBOOT.USB (原厂 U-Boot 含线刷协议)
          dd if=fip_backup.img of=/tmp/orig_fip.bin bs=512 skip=1 2>/dev/null
          dd if=/tmp/orig_fip.bin of=DDR.USB bs=1 count=49152 2>/dev/null
          dd if=/tmp/orig_fip.bin of=UBOOT.USB bs=1 skip=49152 2>/dev/null
          echo "=== Original burn components ==="
          ls -lh DDR.USB UBOOT.USB

      # ========== 下载 ophub Armbian 镜像 ==========
      - name: Find latest ophub image URL
        id: ophub_url
        run: |
          if [ -n "${{ github.event.inputs.ophub_image_url }}" ]; then
            echo "url=${{ github.event.inputs.ophub_image_url }}" >> $GITHUB_OUTPUT
            echo "kernel_source=user" >> $GITHUB_OUTPUT
            echo "Using user-specified URL"
          else
            echo "Finding latest ophub ${OPHUB_SOC} image with kernel ${KERNEL_VERSION}..."
            # 通过 GitHub API 查找 release, 按内核版本过滤
            # ophub 镜像命名: Armbian_XX.XX.X_amlogic_s905l3b_bullseye_6.1.174_server.img.gz
            URL=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
                "https://api.github.com/repos/ophub/amlogic-s9xxx-armbian/releases?per_page=50" \
              | python3 -c "
          import json, sys, re
          soc = '${OPHUB_SOC}'
          kernel = '${KERNEL_VERSION}'
          releases = json.load(sys.stdin)
          # 构建精确的内核版本正则: 6.1 → 匹配 6.1.xxx 但不匹配 6.10/6.11/6.12
          if kernel:
              # 将 '6.1' 转为正则 r'6\.1\.\d+' 精确匹配 6.1.x
              kernel_re = re.compile(r'^' + re.escape(kernel) + r'\.\d+')
          else:
              kernel_re = None
          for rel in releases:
              for asset in rel.get('assets', []):
                  name = asset.get('name', '')
                  if soc in name and name.endswith('.img.gz') and 'server' in name:
                      # 提取文件名中的内核版本号 (如 _6.1.174_)
                      m = re.search(r'_(\d+\.\d+\.\d+)_', name)
                      if kernel_re and m:
                          if not kernel_re.match(m.group(1) + ' '):
                              continue
                      print(asset['browser_download_url'])
                      sys.exit(0)
          # 如果指定内核版本没找到, 回退到任意版本
          if kernel:
              for rel in releases:
                  for asset in rel.get('assets', []):
                      name = asset.get('name', '')
                      if soc in name and name.endswith('.img.gz') and 'server' in name:
                          print(asset['browser_download_url'])
                          sys.exit(0)
          print('')
          ")
            if [ -n "$URL" ]; then
              # 检查找到的镜像内核版本
              FILENAME=$(basename "$URL")
              IMG_KERNEL=$(echo "$FILENAME" | grep -oP '\d+\.\d+\.\d+(?=_server)' | head -1 || echo "unknown")
              echo "Found ophub image: $FILENAME (kernel: $IMG_KERNEL)"
              if [ "${KERNEL_VERSION}" = "6.1" ] && ! echo "$IMG_KERNEL" | grep -qP '^6\.1\.'; then
                echo "WARNING: ophub no longer provides 6.1.y kernel (found $IMG_KERNEL)"
                echo "V6.3: Falling back to archived 6.1.y image from repo Release..."
                # V6.3: ophub 已移除 6.1.y 镜像, 回退到仓库 Release kernel-6.1-archive 存档
                ARCHIVE_URL="https://github.com/${{ github.repository }}/releases/download/kernel-6.1-archive/armbian-6.1.150-s905l3b-jammy.img.gz"
                # 验证存档可下载 (用 Range 请求只下载 1 字节, 避免下载整个 1.4GB 文件)
                HTTP_CODE=$(curl -sL -r 0-0 -o /dev/null -w "%{http_code}" --max-time 30 "$ARCHIVE_URL")
                if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "206" ] || [ "$HTTP_CODE" = "302" ]; then
                  echo "  Archived 6.1.150 image available (HTTP $HTTP_CODE)"
                  echo "url=$ARCHIVE_URL" >> $GITHUB_OUTPUT
                  echo "kernel_source=archive-6.1.150" >> $GITHUB_OUTPUT
                  echo "image_kernel=6.1.150" >> $GITHUB_OUTPUT
                  echo "Using archived 6.1.150 image (will upgrade to 6.1.177 via deb)"
                  exit 0
                else
                  echo "  ERROR: Archive not accessible (HTTP $HTTP_CODE), using ophub fallback"
                  echo "url=$URL" >> $GITHUB_OUTPUT
                  echo "kernel_source=ophub-fallback" >> $GITHUB_OUTPUT
                  echo "image_kernel=$IMG_KERNEL" >> $GITHUB_OUTPUT
                  exit 0
                fi
              else
                echo "url=$URL" >> $GITHUB_OUTPUT
                echo "kernel_source=ophub" >> $GITHUB_OUTPUT
                echo "image_kernel=$IMG_KERNEL" >> $GITHUB_OUTPUT
                echo "Image filename: $FILENAME"
              fi
            else
              echo "ERROR: No ophub ${OPHUB_SOC} image found (kernel=${KERNEL_VERSION})"
              echo "V6.3: Trying archived 6.1.y image from repo Release..."
              ARCHIVE_URL="https://github.com/${{ github.repository }}/releases/download/kernel-6.1-archive/armbian-6.1.150-s905l3b-jammy.img.gz"
              HTTP_CODE=$(curl -sL -r 0-0 -o /dev/null -w "%{http_code}" --max-time 30 "$ARCHIVE_URL")
              if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "206" ] || [ "$HTTP_CODE" = "302" ]; then
                echo "  Archived 6.1.150 image available"
                echo "url=$ARCHIVE_URL" >> $GITHUB_OUTPUT
                echo "kernel_source=archive-6.1.150" >> $GITHUB_OUTPUT
                echo "image_kernel=6.1.150" >> $GITHUB_OUTPUT
              else
                echo "ERROR: No image available from any source!"
                exit 1
              fi
            fi
          fi

      - name: Download ophub Armbian image
        run: |
          URL="${{ steps.ophub_url.outputs.url }}"
          echo "Downloading: $URL"
          # 尝试直连，失败则用代理 (代理需要完整 URL)
          wget -q --timeout=300 -O ophub.img.gz "$URL" || \
          wget -q --timeout=300 -O ophub.img.gz "https://mirror.ghproxy.com/$URL" || \
          wget -q --timeout=300 -O ophub.img.gz "https://gh-proxy.com/$URL" || \
          wget -q --timeout=300 -O ophub.img.gz "https://ghfast.top/$URL"

          ls -lh ophub.img.gz
          echo "Decompressing..."
          gunzip ophub.img.gz
          ls -lh ophub.img

      # ========== 提取 boot 分区 ==========
      - name: Extract boot partition from ophub image
        run: |
          set -e
          # 读取分区表
          echo "=== Partition table ==="
          fdisk -l ophub.img 2>/dev/null || sfdisk -d ophub.img 2>/dev/null

          # 获取第一个分区 (FAT32 boot) 的起始扇区和大小
          BOOT_START=$(sfdisk -d ophub.img 2>/dev/null | grep "ophub.img1" | grep -oP 'start=\s*\K\d+')
          BOOT_COUNT=$(sfdisk -d ophub.img 2>/dev/null | grep "ophub.img1" | grep -oP 'size=\s*\K\d+')
          echo "Boot partition: start=$BOOT_START sectors, size=$BOOT_COUNT sectors"

          # 提取 FAT32 boot 分区
          dd if=ophub.img of=ophub-boot.fat32 bs=512 skip=$BOOT_START count=$BOOT_COUNT 2>/dev/null
          ls -lh ophub-boot.fat32

          # 提取 boot 文件
          mkdir -p ophub-boot-files
          mcopy -s -i ophub-boot.fat32 :: ophub-boot-files/

          echo "=== Boot files ==="
          find ophub-boot-files -type f | sort

      # ========== V6.3: 内核升级 (6.1.150 → 6.1.177) ==========
      - name: Upgrade kernel to 6.1.177 via deb package
        id: kernel_upgrade
        run: |
          set -e
          KERNEL_SOURCE="${{ steps.ophub_url.outputs.kernel_source }}"
          IMG_KERNEL="${{ steps.ophub_url.outputs.image_kernel }}"
          echo "=== Kernel source: $KERNEL_SOURCE (image kernel: $IMG_KERNEL) ==="

          # V6.3: 如果使用存档 6.1.150 镜像, 用 deb-6.1.177 升级内核
          # 如果 ophub 直接提供了 6.1.y, 跳过升级
          if echo "$IMG_KERNEL" | grep -qP '^6\.1\.'; then
            echo "Image already has 6.1.y kernel ($IMG_KERNEL)"
            # 检查是否需要升级到 6.1.177
            IMG_PATCH=$(echo "$IMG_KERNEL" | cut -d. -f3)
            if [ "$IMG_PATCH" -ge 177 ]; then
              echo "Kernel already at 6.1.177+, skipping upgrade"
              echo "upgraded=false" >> $GITHUB_OUTPUT
              exit 0
            fi
            echo "Upgrading 6.1.$IMG_PATCH → 6.1.177..."
          else
            echo "Image has non-6.1 kernel ($IMG_KERNEL), upgrading to 6.1.177..."
          fi

          # 下载 deb-6.1.177.tar.gz 从仓库 Release kernel-6.1-archive
          DEB_URL="https://github.com/${{ github.repository }}/releases/download/kernel-6.1-archive/deb-6.1.177.tar.gz"
          echo "Downloading kernel deb package..."
          wget -q --timeout=120 -O /tmp/deb-6.1.177.tar.gz "$DEB_URL" || \
          wget -q --timeout=120 -O /tmp/deb-6.1.177.tar.gz "https://mirror.ghproxy.com/$DEB_URL" || \
          wget -q --timeout=120 -O /tmp/deb-6.1.177.tar.gz "https://gh-proxy.com/$DEB_URL"

          if [ ! -s /tmp/deb-6.1.177.tar.gz ]; then
            echo "ERROR: Failed to download deb-6.1.177.tar.gz"
            echo "upgraded=false" >> $GITHUB_OUTPUT
            exit 0  # 不中断构建, 使用镜像原始内核
          fi
          echo "Downloaded: $(ls -lh /tmp/deb-6.1.177.tar.gz | awk '{print $5}')"

          # 解压 deb 包
          mkdir -p /tmp/kernel-deb
          tar xzf /tmp/deb-6.1.177.tar.gz -C /tmp/kernel-deb
          echo "=== Deb package contents ==="
          ls -la /tmp/kernel-deb/deb-6.1.177/

          # 提取 linux-image deb → vmlinuz + uInitrd + 内核模块
          mkdir -p /tmp/img-extract
          cd /tmp/img-extract
          ar x /tmp/kernel-deb/deb-6.1.177/linux-image_6.1.177-1-ophub_arm64.deb
          tar xf data.tar.xz
          echo "=== Kernel image files ==="
          ls -lh boot/vmlinuz-* boot/uInitrd-* 2>/dev/null

          # 提取 dtb-meson64 deb → Amlogic DTB
          mkdir -p /tmp/dtb-extract
          cd /tmp/dtb-extract
          ar x /tmp/kernel-deb/deb-6.1.177/linux-dtb-meson64_6.1.177-1-ophub_arm64.deb
          tar xf data.tar.xz
          echo "=== DTB files (s905l3b) ==="
          find boot/dtb/amlogic -name "*s905l3b*" -o -name "*s905l2*" -o -name "*p212*" | sort

          cd $GITHUB_WORKSPACE

          # 替换 boot 文件 (vmlinuz → zImage, uInitrd)
          echo "=== Replacing kernel in boot files ==="
          # 找到 vmlinuz 和 uInitrd 文件名
          VMLINUZ=$(ls /tmp/img-extract/boot/vmlinuz-* 2>/dev/null | head -1)
          UINITRD=$(ls /tmp/img-extract/boot/uInitrd-* 2>/dev/null | head -1)

          if [ -n "$VMLINUZ" ] && [ -f "$VMLINUZ" ]; then
            cp "$VMLINUZ" ophub-boot-files/zImage
            echo "  Replaced zImage with $(basename $VMLINUZ) ($(ls -lh ophub-boot-files/zImage | awk '{print $5}'))"
          else
            echo "  WARNING: vmlinuz not found in deb, keeping original zImage"
          fi

          if [ -n "$UINITRD" ] && [ -f "$UINITRD" ]; then
            cp "$UINITRD" ophub-boot-files/uInitrd
            echo "  Replaced uInitrd with $(basename $UINITRD) ($(ls -lh ophub-boot-files/uInitrd | awk '{print $5}'))"
          else
            echo "  WARNING: uInitrd not found in deb, keeping original uInitrd"
          fi

          # 替换 DTB 文件
          echo "=== Replacing DTB files ==="
          DTB_SRC="/tmp/dtb-extract/boot/dtb/amlogic"
          for dtb in meson-gxl-s905l3b-e900v22e.dtb meson-gxl-s905l3b-m302a.dtb \
                     meson-gxl-s905l3a.dtb meson-gxl-s905l3.dtb meson-gxl-s905l3b.dtb \
                     meson-gxl-s905l2.dtb meson-gxl-s905x-p212.dtb; do
            if [ -f "$DTB_SRC/$dtb" ]; then
              cp "$DTB_SRC/$dtb" "ophub-boot-files/dtb/amlogic/$dtb"
              echo "  Updated: $dtb"
            fi
          done

          # 保存内核模块路径 (供 rootfs 注入步骤使用)
          MODULES_DIR="/tmp/img-extract/usr/lib/modules/6.1.177-ophub"
          if [ -d "$MODULES_DIR" ]; then
            echo "modules_dir=$MODULES_DIR" >> $GITHUB_OUTPUT
            echo "  Kernel modules: $(find $MODULES_DIR -name '*.ko' | wc -l) .ko files"
          fi

          echo "upgraded=true" >> $GITHUB_OUTPUT
          echo "final_kernel=6.1.177" >> $GITHUB_OUTPUT
          echo "=== Kernel upgrade to 6.1.177 complete ==="

      # ========== 创建 boot.PARTITION (64MB FAT32) ==========
      - name: Create boot.PARTITION (FAT32, 64MB)
        run: |
          set -e
          truncate -s 64M boot.PARTITION
          mkfs.vfat -F 32 -n BOOT boot.PARTITION

          DIR=ophub-boot-files

          # 内核
          mcopy -i boot.PARTITION ${DIR}/zImage ::zImage
          # initramfs
          mcopy -i boot.PARTITION ${DIR}/uInitrd ::uInitrd
          # 从 ophub uEnv.txt 提取 root=UUID= 参数
          ROOT_UUID=$(grep -oP 'root=UUID=\K[a-f0-9-]+' ${DIR}/uEnv.txt || echo "")
          if [ -z "$ROOT_UUID" ]; then
            echo "WARNING: No UUID in uEnv.txt, using fallback"
            ROOT_UUID="9e65a41f-0451-48db-90da-5f7f330f7fe8"
          fi
          echo "Root UUID: $ROOT_UUID"

          # V3: 默认 DTB 改为 e900v22e (修复 HDMI 控制器 0d0d:0d:0d 问题)
          # V5: 会在下方定制为 b860av21 专用 DTB (eMMC 时序修复)
          DEFAULT_DTB="meson-gxl-s905l3b-e900v22e.dtb"

          # 引导脚本 (如果存在) - 先复制, 后面统一生成配置
          for f in boot.scr boot.cmd emmc_autoscript emmc_autoscript.cmd \
                   s905_autoscript s905_autoscript.cmd \
                   aml_autoscript aml_autoscript.cmd; do
            [ -f "${DIR}/${f}" ] && mcopy -i boot.PARTITION ${DIR}/${f} ::${f}
          done

          # DTB 目录
          mmd -i boot.PARTITION ::dtb
          mmd -i boot.PARTITION ::dtb/amlogic
          # 复制所有 GXL S905L DTB (多 DTB 备用)
          for dtb in ${DIR}/dtb/amlogic/meson-gxl-s905l3b-*.dtb \
                     ${DIR}/dtb/amlogic/meson-gxl-s905l2-*.dtb \
                     ${DIR}/dtb/amlogic/meson-gxl-s905x-p212.dtb; do
            [ -f "$dtb" ] && mcopy -i boot.PARTITION "$dtb" ::dtb/amlogic/$(basename $dtb)
          done

          # V5: 创建 B860AV2.1-A 专用 DTB (修复 eMMC 时序兼容性)
          # 设备 eMMC: mafId=214 (0xD6), 二线/国产芯片, HS200 时序裕量差
          # e900v22e DTB 使用 max-frequency=200MHz + mmc-hs200-1_8v, 过于激进
          # 解决方案: 降低 eMMC 频率到 50MHz, 移除 HS200/DDR, 保留 High Speed
          SOURCE_DTB="${DIR}/dtb/amlogic/meson-gxl-s905l3b-e900v22e.dtb"
          CUSTOM_DTB="meson-gxl-s905l3b-b860av21.dtb"
          if [ -f "$SOURCE_DTB" ]; then
            echo "=== Creating B860AV2.1-A custom DTB (eMMC timing fix) ==="
            # 反编译 DTB
            dtc -I dtb -O dts "$SOURCE_DTB" -o /tmp/custom.dts 2>/dev/null
            # 记录原始 eMMC 频率 (用于验证修改)
            ORIG_FREQ=$(grep -oP 'max-frequency = <\K[0-9a-f]+' /tmp/custom.dts | head -1 || echo "unknown")
            echo "  Original eMMC max-frequency: $ORIG_FREQ"
            # 修改 eMMC 节点: 降低 max-frequency 到 50MHz, 移除 HS200/DDR
            # 0xbebc200 = 200000000 (200MHz), 0x2faf080 = 50000000 (50MHz)
            sed -i 's/0xbebc200/0x2faf080/g' /tmp/custom.dts  # 200MHz -> 50MHz
            # 如果 DTB 中 max-frequency 不是用十六进制而是十进制
            sed -i 's/max-frequency = <200000000>/max-frequency = <50000000>/g' /tmp/custom.dts
            # 移除 HS200 和 DDR (将这些行删除)
            sed -i '/mmc-hs200-1_8v/d' /tmp/custom.dts
            sed -i '/mmc-ddr-1_8v/d' /tmp/custom.dts
            # 验证修改是否生效
            NEW_FREQ=$(grep -oP 'max-frequency = <\K[0-9a-f]+' /tmp/custom.dts | head -1 || echo "unknown")
            HS200_REMAIN=$(grep -c 'mmc-hs200-1_8v' /tmp/custom.dts || echo "0")
            echo "  New eMMC max-frequency: $NEW_FREQ (orig: $ORIG_FREQ)"
            echo "  HS200 removed: $([ "$HS200_REMAIN" = "0" ] && echo 'YES' || echo 'NO')"
            if [ "$NEW_FREQ" = "$ORIG_FREQ" ] && [ "$ORIG_FREQ" != "unknown" ]; then
              echo "  WARNING: max-frequency not changed! sed pattern may not match."
              echo "  Falling back to e900v22e DTB"
            else
              # 重新编译
              dtc -I dts -O dtb /tmp/custom.dts -o "/tmp/${CUSTOM_DTB}" 2>/dev/null
              if [ -s "/tmp/${CUSTOM_DTB}" ]; then
                mcopy -i boot.PARTITION "/tmp/${CUSTOM_DTB}" ::dtb/amlogic/${CUSTOM_DTB}
                echo "  Created ${CUSTOM_DTB} (eMMC 50MHz, no HS200/DDR)"
                # 将默认 DTB 切换为定制版本
                DEFAULT_DTB="$CUSTOM_DTB"
                echo "  Default DTB switched to ${CUSTOM_DTB}"
              else
                echo "  WARNING: Custom DTB compilation failed, using e900v22e"
              fi
            fi
          fi

          # V4: 生成 uEnv.txt (使用最终 DEFAULT_DTB, 包含 clk_ignore_unused + earlycon)
          printf 'LINUX=/zImage\nINITRD=/uInitrd\nFDT=dtb/amlogic/%s\nAPPEND=root=UUID=%s rootflags=data=writeback rw rootwait rootfstype=ext4 console=ttyAML0,115200n8 console=tty0 no_console_suspend consoleblank=0 clk_ignore_unused earlycon fsck.fix=yes fsck.repair=yes net.ifnames=0 max_loop=128 loglevel=1\n' "${DEFAULT_DTB}" "${ROOT_UUID}" > /tmp/uEnv.txt
          mcopy -i boot.PARTITION /tmp/uEnv.txt ::uEnv.txt

          # 修改 boot.ini: 使用最终 DEFAULT_DTB + V4: 修正 initrd 加载地址
          if [ -f "${DIR}/boot.ini" ]; then
            cp ${DIR}/boot.ini /tmp/boot.ini
            sed -i "s|setenv dtb_name.*|setenv dtb_name ${DEFAULT_DTB}|g" /tmp/boot.ini
            sed -i "s|setenv fdtfile.*|setenv fdtfile ${DEFAULT_DTB}|g" /tmp/boot.ini
            # V4: 修正 initrd 加载地址为 0x15000000 (64MB 边界), 防止与内核镜像重叠
            sed -i 's|setenv initrd_addr.*|setenv initrd_addr 0x15000000|g' /tmp/boot.ini
            sed -i 's|setenv ramdisk_addr_r.*|setenv ramdisk_addr_r 0x15000000|g' /tmp/boot.ini
            # 如果 boot.ini 中没有 initrd_addr, 添加它
            grep -q 'initrd_addr' /tmp/boot.ini || sed -i '/setenv dtb_name/a setenv initrd_addr 0x15000000' /tmp/boot.ini
            mcopy -i boot.PARTITION /tmp/boot.ini ::boot.ini
          fi

          # V6.2: Logo 集成 - 复制 logo.bmp 并生成带 BMP 显示的 boot.scr
          LOGO_READY="${{ steps.logo.outputs.logo_status }}"
          if [ "$LOGO_READY" = "ready" ] && [ -f "assets/logo.bmp" ]; then
            echo "=== Integrating boot logo into boot.scr ==="
            # 复制 logo.bmp 到 boot 分区根目录
            mcopy -i boot.PARTITION assets/logo.bmp ::logo.bmp
            echo "  logo.bmp copied to boot partition"
            # 用 printf 生成 boot.cmd (避免 heredoc 在 YAML 中的缩进问题)
            # V6.2 fix: 移除 ODROIDN2-UBOOT-CONFIG (Odroid 专有, 主线 U-Boot 会报 Unknown command)
            # V6.2 fix: 移除 osd/open/clear (主线 U-Boot 无此命令)
            # V6.2 fix: 移除 outputmode/hdmimode (Amlogic 厂商 U-Boot 专有变量)
            # V6.2 fix: 添加 :${distro_bootpart} 到 load 命令 (bootmeth_script 设置的分区号)
            # V6.2 fix: 添加 bootargs 回退 (uEnv.txt 加载失败时使用默认参数)
            # 主线 U-Boot DM Video (VIDEO_MESON) 会自动通过 HDMI EDID 初始化显示输出
            printf '%s\n' \
              'setenv env_addr 0x10400000' \
              'setenv kernel_addr 0x11000000' \
              'setenv initrd_addr 0x15000000' \
              'setenv dtb_addr 0x1000000' \
              'setenv logo_addr 0x20000000' \
              'if test "${devtype}" = ""; then setenv devtype "mmc"; fi' \
              'if test "${devnum}" = ""; then setenv devnum 0; fi' \
              'if test "${distro_bootpart}" = ""; then setenv distro_bootpart 1; fi' \
              'if load ${devtype} ${devnum}:${distro_bootpart} ${logo_addr} logo.bmp; then' \
              '  bmp display ${logo_addr} 0 0' \
              '  echo "Boot logo displayed"' \
              'else' \
              '  echo "WARNING: logo.bmp not found, continuing without logo"' \
              'fi' \
              'if load ${devtype} ${devnum}:${distro_bootpart} ${env_addr} uEnv.txt; then' \
              '  env import -t ${env_addr} ${filesize}' \
              '  setenv bootargs ${APPEND}' \
              'else' \
              '  echo "ERROR: uEnv.txt not found, using fallback bootargs"' \
              '  setenv bootargs "root=/dev/mmcblk0p2 rootflags=data=writeback rw rootwait rootfstype=ext4 console=ttyAML0,115200n8 console=tty0 no_console_suspend consoleblank=0 clk_ignore_unused earlycon net.ifnames=0 loglevel=1"' \
              'fi' \
              'load ${devtype} ${devnum}:${distro_bootpart} ${kernel_addr} ${LINUX}' \
              'load ${devtype} ${devnum}:${distro_bootpart} ${initrd_addr} ${INITRD}' \
              'load ${devtype} ${devnum}:${distro_bootpart} ${dtb_addr} ${FDT}' \
              'fdt addr ${dtb_addr}' \
              'booti ${kernel_addr} ${initrd_addr} ${dtb_addr}' \
              > /tmp/boot.cmd
            echo "  boot.cmd generated ($(wc -c < /tmp/boot.cmd) bytes)"
            # 编译 boot.scr (mkimage)
            mkimage -C none -A arm -T script -d /tmp/boot.cmd /tmp/boot.scr
            echo "  mkimage completed (exit: $?)"
            # 先删除旧 boot.scr 再复制 (避免覆盖问题)
            mdel -i boot.PARTITION ::boot.scr 2>/dev/null || true
            mcopy -i boot.PARTITION /tmp/boot.scr ::boot.scr
            echo "  boot.scr copied to boot partition (exit: $?)"
            echo "  boot.scr compiled with BMP logo display"
            # 不创建 extlinux.conf, 让 bootflow 使用 boot.scr (BMP 显示需要 boot.scr)
          else
            echo "=== No logo.bmp, using extlinux.conf as primary boot method ==="
            # extlinux 目录 (用于主线 U-Boot distro boot)
            mmd -i boot.PARTITION ::extlinux
            # 生成 extlinux.conf (V3: 添加 timeout + default + 额外稳定性参数; V4: clk_ignore_unused)
            printf 'default Armbian\ntimeout 3\n\nlabel Armbian\n    kernel /zImage\n    initrd /uInitrd\n    fdt /dtb/amlogic/%s\n    append root=UUID=%s rootflags=data=writeback rw rootwait rootfstype=ext4 console=ttyAML0,115200n8 console=tty0 no_console_suspend consoleblank=0 clk_ignore_unused earlycon fsck.fix=yes fsck.repair=yes net.ifnames=0 max_loop=128 loglevel=1\n' "${DEFAULT_DTB}" "${ROOT_UUID}" > /tmp/extlinux.conf
            mcopy -i boot.PARTITION /tmp/extlinux.conf ::extlinux/extlinux.conf
          fi

          echo "=== boot.PARTITION contents ==="
          mdir -i boot.PARTITION ::/
          echo "---"
          mdir -i boot.PARTITION ::dtb/amlogic/
          ls -lh boot.PARTITION

      # ========== 提取并缩小 rootfs ==========
      - name: Extract and shrink rootfs
        run: |
          set -e
          # 获取第二个分区 (ext4 rootfs) 的起始扇区
          ROOTFS_START=$(sfdisk -d ophub.img 2>/dev/null | grep "ophub.img2" | grep -oP 'start=\s*\K\d+')
          ROOTFS_COUNT=$(sfdisk -d ophub.img 2>/dev/null | grep "ophub.img2" | grep -oP 'size=\s*\K\d+')
          echo "Rootfs partition: start=$ROOTFS_START sectors, size=$ROOTFS_COUNT sectors"

          # 提取 ext4 rootfs 分区
          dd if=ophub.img of=system.PARTITION bs=512 skip=$ROOTFS_START count=$ROOTFS_COUNT 2>/dev/null
          ls -lh system.PARTITION

          # 检查并修复文件系统
          e2fsck -fy system.PARTITION 2>&1 | tail -5

          # V4: tune2fs 优化 - 提升首次启动可靠性
          # 禁用 metadata_csum (部分老内核不支持, 导致挂载失败)
          # 设置 journal_data_writeback (减少同步 I/O, ophub bootargs 已配 data=writeback)
          # 禁用定期 fsck (首次启动不需要额外检查延迟)
          tune2fs -O ^metadata_csum system.PARTITION 2>/dev/null || true
          tune2fs -o journal_data_writeback system.PARTITION 2>/dev/null || true
          tune2fs -c 0 -i 0 system.PARTITION 2>/dev/null || true
          echo "tune2fs optimizations applied"

          # 缩小到最小可用大小
          resize2fs -M system.PARTITION 2>&1

          # 获取缩小后的块数
          BLOCKS=$(dumpe2fs -h system.PARTITION 2>/dev/null | grep 'Block count' | awk '{print $3}')
          BLKSIZE=$(dumpe2fs -h system.PARTITION 2>/dev/null | grep 'Block size' | awk '{print $3}')
          FILE_SIZE=$((BLOCKS * BLKSIZE))
          echo "Shrunk to $(( FILE_SIZE / 1024 / 1024 )) MB ($BLOCKS blocks)"

          # 截断文件到实际大小
          truncate -s $FILE_SIZE system.PARTITION

          echo "=== system.PARTITION ==="
          ls -lh system.PARTITION
          dumpe2fs -h system.PARTITION 2>/dev/null | grep -E "UUID|Block count|Free blocks"

      # ========== V3: 注入网络可靠性脚本 ==========
      - name: Inject network reliability scripts into rootfs
        run: |
          # 禁用 set -e: GitHub Actions 默认 bash -e -o pipefail, 部分非关键命令可能返回非零
          set +e
          echo "=== Injecting network reliability scripts ==="

          # V3 关键修复: 用实际 rootfs UUID 重新生成 boot 配置文件
          # ophub uEnv.txt 中的 UUID 与实际 ext4 UUID 不匹配, 这是导致启动失败的主要原因之一
          ACTUAL_UUID=$(dumpe2fs -h system.PARTITION 2>/dev/null | grep -oP 'UUID:\s+\K[a-f0-9-]+' || echo "")
          echo "Actual rootfs UUID: $ACTUAL_UUID"

          if [ -n "$ACTUAL_UUID" ]; then
            # V5: 使用定制 DTB (eMMC 时序修复), 如果不存在则回退到 e900v22e
            if mdir -i boot.PARTITION ::dtb/amlogic/meson-gxl-s905l3b-b860av21.dtb 2>/dev/null; then
              DEFAULT_DTB="meson-gxl-s905l3b-b860av21.dtb"
            else
              DEFAULT_DTB="meson-gxl-s905l3b-e900v22e.dtb"
            fi
            BOOT_ARGS="root=UUID=${ACTUAL_UUID} rootflags=data=writeback rw rootwait rootfstype=ext4 console=ttyAML0,115200n8 console=tty0 no_console_suspend consoleblank=0 clk_ignore_unused earlycon fsck.fix=yes fsck.repair=yes net.ifnames=0 max_loop=128 loglevel=1"

            # 重新生成 extlinux.conf (仅当存在时, 即无 Logo 模式; Logo 模式使用 boot.scr)
            if mdir -i boot.PARTITION ::extlinux/extlinux.conf 2>/dev/null; then
              printf 'default Armbian\ntimeout 3\n\nlabel Armbian\n    kernel /zImage\n    initrd /uInitrd\n    fdt /dtb/amlogic/%s\n    append %s\n' \
                "$DEFAULT_DTB" "$BOOT_ARGS" > /tmp/extlinux.conf
              mcopy -i boot.PARTITION /tmp/extlinux.conf ::extlinux/extlinux.conf
              echo "  extlinux.conf regenerated with UUID $ACTUAL_UUID"
            else
              echo "  extlinux.conf not present (logo mode, using boot.scr), skipping"
            fi

            # 直接重新生成 uEnv.txt
            printf 'LINUX=/zImage\nINITRD=/uInitrd\nFDT=dtb/amlogic/%s\nAPPEND=%s\n' \
              "$DEFAULT_DTB" "$BOOT_ARGS" > /tmp/uEnv.txt
            mcopy -i boot.PARTITION /tmp/uEnv.txt ::uEnv.txt
            echo "  uEnv.txt regenerated with UUID $ACTUAL_UUID"

            echo "UUID fix complete in boot.PARTITION"
          else
            echo "WARNING: Could not determine actual UUID, skipping UUID fix"
          fi

          # 扩展 rootfs 增加 250MB 空间用于注入 (V6.4: +200MB for Mesa GPU 驱动)
          e2fsck -fy system.PARTITION 2>&1 | tail -3
          CURRENT_BLOCKS=$(dumpe2fs -h system.PARTITION 2>/dev/null | grep 'Block count' | awk '{print $3}')
          BLKSIZE=$(dumpe2fs -h system.PARTITION 2>/dev/null | grep 'Block size' | awk '{print $3}')
          CURRENT_MB=$(( CURRENT_BLOCKS * BLKSIZE / 1024 / 1024 ))
          TARGET_MB=$(( CURRENT_MB + 250 ))
          echo "Expanding rootfs: ${CURRENT_MB}MB -> ${TARGET_MB}MB"
          truncate -s ${TARGET_MB}M system.PARTITION
          resize2fs system.PARTITION 2>&1 | tail -3

          # V6: 下载 WiFi 固件 (SSV6051 不包含在 ophub 默认固件中)
          echo "=== Downloading WiFi firmware ==="
          mkdir -p /tmp/wifi-firmware/ssv6051
          FW_BASE="https://raw.githubusercontent.com/armbian/firmware/master"
          # SSV6051 / SV6256P 固件 (硅谷数模, B860AV2.1 固件中的 ssv_dump_flash 服务对应)
          wget -q -O /tmp/wifi-firmware/ssv6051-sw.bin    "${FW_BASE}/ssv6051-sw.bin"    || true
          wget -q -O /tmp/wifi-firmware/ssv6051-wifi.cfg  "${FW_BASE}/ssv6051-wifi.cfg"  || true
          wget -q -O /tmp/wifi-firmware/ssv6x5x-sw.bin    "${FW_BASE}/ssv6x5x-sw.bin"    || true
          wget -q -O /tmp/wifi-firmware/ssv6x5x-wifi.cfg  "${FW_BASE}/ssv6x5x-wifi.cfg"  || true
          # 复制到 ssv6051 子目录 (部分驱动版本从此路径加载)
          cp /tmp/wifi-firmware/ssv6051-sw.bin   /tmp/wifi-firmware/ssv6051/ 2>/dev/null || true
          cp /tmp/wifi-firmware/ssv6051-wifi.cfg /tmp/wifi-firmware/ssv6051/ 2>/dev/null || true
          echo "WiFi firmware downloaded:"
          ls -la /tmp/wifi-firmware/ /tmp/wifi-firmware/ssv6051/ 2>/dev/null

          # 挂载 rootfs (关键操作: 失败则退出)
          sudo mkdir -p /mnt/rootfs
          if ! sudo mount -o loop system.PARTITION /mnt/rootfs; then
            echo "ERROR: Failed to mount system.PARTITION"
            exit 1
          fi
          echo "Rootfs mounted successfully"

          # V6.3: 替换 rootfs 中的内核模块 (6.1.150 → 6.1.177)
          KERNEL_UPGRADED="${{ steps.kernel_upgrade.outputs.upgraded }}"
          MODULES_DIR="${{ steps.kernel_upgrade.outputs.modules_dir }}"
          if [ "$KERNEL_UPGRADED" = "true" ] && [ -n "$MODULES_DIR" ] && [ -d "$MODULES_DIR" ]; then
            echo "=== V6.3: Replacing kernel modules in rootfs ==="
            # 删除旧内核模块 (6.1.150 或其他版本)
            sudo rm -rf /mnt/rootfs/usr/lib/modules/6.1.150-ophub 2>/dev/null || true
            sudo rm -rf /mnt/rootfs/usr/lib/modules/6.1.149-ophub 2>/dev/null || true
            sudo rm -rf /mnt/rootfs/usr/lib/modules/6.12.* 2>/dev/null || true
            sudo rm -rf /mnt/rootfs/usr/lib/modules/6.18.* 2>/dev/null || true
            # 复制新内核模块
            sudo mkdir -p /mnt/rootfs/usr/lib/modules/
            sudo cp -a "$MODULES_DIR" /mnt/rootfs/usr/lib/modules/
            echo "  Installed modules: 6.1.177-ophub"
            echo "  Module count: $(find /mnt/rootfs/usr/lib/modules/6.1.177-ophub -name '*.ko' | wc -l)"
            # 创建 modules.dep
            if [ -f /mnt/rootfs/usr/lib/modules/6.1.177-ophub/modules.dep ]; then
              echo "  modules.dep already present"
            else
              echo "  WARNING: modules.dep not found, depmod will run on first boot"
            fi
          else
            echo "Kernel modules not upgraded (upgraded=$KERNEL_UPGRADED)"
          fi

          # 复制 rootfs-overlay 文件
          if [ -d rootfs-overlay ]; then
            echo "Copying rootfs-overlay files..."
            sudo cp -a rootfs-overlay/* /mnt/rootfs/
            echo "Overlay files copied"
          else
            echo "WARNING: rootfs-overlay directory not found"
          fi

          # V6: 注入 WiFi 固件到 rootfs
          echo "=== Injecting WiFi firmware into rootfs ==="
          sudo mkdir -p /mnt/rootfs/lib/firmware/ssv6051
          # SSV6051 固件放到 /lib/firmware/ 和 /lib/firmware/ssv6051/ 两个路径
          # (不同驱动版本查找路径不同)
          for fw in ssv6051-sw.bin ssv6051-wifi.cfg ssv6x5x-sw.bin ssv6x5x-wifi.cfg; do
            if [ -f "/tmp/wifi-firmware/$fw" ]; then
              sudo cp "/tmp/wifi-firmware/$fw" /mnt/rootfs/lib/firmware/
              echo "  Installed: /lib/firmware/$fw"
            fi
          done
          # 复制到 ssv6051 子目录
          sudo cp /tmp/wifi-firmware/ssv6051/* /mnt/rootfs/lib/firmware/ssv6051/ 2>/dev/null || true
          echo "WiFi firmware injection complete"
          sudo ls -la /mnt/rootfs/lib/firmware/ssv6051* 2>/dev/null

          # V6.4: 验证 lima 内核模块存在 (ophub stable config-6.1 已启用 CONFIG_DRM_LIMA=m)
          echo "=== V6.4: Verifying lima kernel module ==="
          LIMA_KO=$(sudo find /mnt/rootfs/usr/lib/modules -name "lima.ko" 2>/dev/null | head -1)
          if [ -n "$LIMA_KO" ]; then
            echo "  lima.ko found: $LIMA_KO"
            echo "  Mali-450 GPU kernel driver is available"
          else
            echo "  WARNING: lima.ko not found in kernel modules!"
            echo "  GPU acceleration will not work. Check ophub kernel config."
            # 搜索所有 .ko 确认模块目录结构
            echo "  Total .ko files: $(sudo find /mnt/rootfs/usr/lib/modules -name '*.ko' 2>/dev/null | wc -l)"
            echo "  DRM related modules:"
            sudo find /mnt/rootfs/usr/lib/modules -name "*drm*" -o -name "*lima*" -o -name "*meson*" 2>/dev/null | head -20
          fi

          # V6.4: 安装 Mesa GPU 用户空间驱动 (lima gallium driver)
          echo "=== V6.4: Installing Mesa GPU userspace drivers ==="
          # 方法: 下载 arm64 deb 包并提取到 rootfs (避免 chroot/qemu 复杂性)
          # 配置 apt arm64 源
          sudo dpkg --add-architecture arm64 2>/dev/null || true
          # 检查是否已有 arm64 源, 避免重复添加
          if ! grep -r "ports.ubuntu.com" /etc/apt/sources.list.d/ 2>/dev/null | grep -q arm64; then
            echo "deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports/ jammy main universe" | sudo tee /etc/apt/sources.list.d/arm64-ports.list
            echo "deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports/ jammy-updates main universe" | sudo tee -a /etc/apt/sources.list.d/arm64-ports.list
          fi
          sudo apt-get update -qq 2>/dev/null || true

          # 下载 arm64 Mesa 相关包 (含关键依赖 libglapi-mesa)
          mkdir -p /tmp/mesa-debs
          cd /tmp/mesa-debs
          echo "  Downloading arm64 Mesa packages..."
          # 逐个下载, 避免单个失败导致全部丢失
          for pkg in \
            libgl1-mesa-dri:arm64 \
            libglapi-mesa:arm64 \
            mesa-utils:arm64 \
            libegl-mesa0:arm64 \
            libegl1:arm64 \
            libgles2:arm64 \
            libgbm1:arm64 \
            libgl1:arm64 \
            libglx-mesa0:arm64 \
            libdrm2:arm64 \
            libexpat1:arm64 \
            libxshmfence1:arm64 \
            libxxf86vm1:arm64 \
            libxcb-dri2-0:arm64 \
            libxcb-dri3-0:arm64 \
            libxcb-glx0:arm64 \
            libllvm15:arm64 \
            libzstd1:arm64 \
            libelf1:arm64; do
            apt-get download "$pkg" 2>/dev/null && echo "    OK: $pkg" || echo "    SKIP: $pkg (not found or already satisfied)"
          done

          if ls *.deb 2>/dev/null | grep -q .; then
            echo "  Downloaded packages:"
            ls -lh *.deb

            # 提取所有 deb 包到临时目录
            mkdir -p /tmp/mesa-extract
            for deb in *.deb; do
              dpkg-deb -x "$deb" /tmp/mesa-extract/ 2>/dev/null || true
            done

            # 复制 Mesa 库文件到 rootfs
            echo "  Copying Mesa files to rootfs..."
            if [ -d /tmp/mesa-extract/usr/lib/aarch64-linux-gnu ]; then
              sudo cp -a /tmp/mesa-extract/usr/lib/aarch64-linux-gnu/* \
                /mnt/rootfs/usr/lib/aarch64-linux-gnu/ 2>/dev/null || true
            fi
            # 复制可执行文件 (glxinfo, glxgears 等)
            if [ -d /tmp/mesa-extract/usr/bin ]; then
              sudo cp -a /tmp/mesa-extract/usr/bin/* \
                /mnt/rootfs/usr/bin/ 2>/dev/null || true
            fi
            # 复制配置文件 (如有)
            if [ -d /tmp/mesa-extract/etc ]; then
              sudo cp -a /tmp/mesa-extract/etc/* \
                /mnt/rootfs/etc/ 2>/dev/null || true
            fi
            # 复制 share 文件 (drirc, 等)
            if [ -d /tmp/mesa-extract/usr/share ]; then
              sudo mkdir -p /mnt/rootfs/usr/share
              sudo cp -a /tmp/mesa-extract/usr/share/* \
                /mnt/rootfs/usr/share/ 2>/dev/null || true
            fi

            # 验证 lima_dri.so 是否安装成功
            LIMA_DRI=$(sudo find /mnt/rootfs/usr/lib -name "lima_dri.so" 2>/dev/null | head -1)
            if [ -n "$LIMA_DRI" ]; then
              echo "  SUCCESS: Mesa lima DRI driver installed: $LIMA_DRI"
              echo "  Mali-450 GPU acceleration is ready"
            else
              echo "  WARNING: lima_dri.so not found after installation!"
              echo "  Mesa may not include lima driver in this version"
            fi

            # 验证 glxinfo
            if sudo test -f /mnt/rootfs/usr/bin/glxinfo; then
              echo "  glxinfo installed (for GPU verification)"
            fi

            # 更新 ld.so 缓存 (通过 chroot + qemu, 或手动创建符号链接)
            echo "  Updating library links..."
            # 尝试多种方式运行 ldconfig (qemu-user-static 已安装)
            LDCONFIG_OK=false
            # 方式1: 直接 ldconfig
            if sudo chroot /mnt/rootfs /sbin/ldconfig 2>/dev/null; then
              echo "  ldconfig via chroot succeeded"
              LDCONFIG_OK=true
            # 方式2: 通过 bash 调用
            elif sudo chroot /mnt/rootfs /bin/bash -c "ldconfig" 2>/dev/null; then
              echo "  ldconfig via bash succeeded"
              LDCONFIG_OK=true
            fi
            # 方式3: 生成 ld.so.conf 并手动创建 ld.so.cache (即使 qemu 不可用)
            if [ "$LDCONFIG_OK" = "false" ]; then
              echo "  chroot ldconfig failed, using fallback..."
              # 确保 ld.so.conf.d 目录存在并包含标准路径
              sudo mkdir -p /mnt/rootfs/etc/ld.so.conf.d
              echo "/usr/lib/aarch64-linux-gnu" | sudo tee /mnt/rootfs/etc/ld.so.conf.d/aarch64.conf > /dev/null
              echo "/usr/local/lib" | sudo tee -a /mnt/rootfs/etc/ld.so.conf.d/aarch64.conf > /dev/null
              # 确保 ld.so.conf 包含 ld.so.conf.d
              if ! sudo grep -q "ld.so.conf.d" /mnt/rootfs/etc/ld.so.conf 2>/dev/null; then
                echo "include /etc/ld.so.conf.d/*.conf" | sudo tee -a /mnt/rootfs/etc/ld.so.conf > /dev/null
              fi
              # gpu-setup.sh 在首次启动时会再次运行 ldconfig 作为保障
              echo "  Library paths configured, ldconfig will run on first boot"
            fi

            # V6.4.1 fix: chroot/sudo 操作可能破坏 /dev/null 权限, 立即修复
            # 否则后续所有 2>/dev/null 重定向都会失败, 导致验证误报
            sudo chmod 666 /dev/null 2>/dev/null || true

            # 验证关键库文件存在
            echo "  Verifying key Mesa libraries..."
            for lib in libglapi.so libGL.so libEGL.so libGLESv2.so libgbm.so libdrm.so libLLVM-15.so libzstd.so; do
              FOUND=$(sudo find /mnt/rootfs/usr/lib -name "${lib}*" 2>/dev/null | head -1)
              if [ -n "$FOUND" ]; then
                echo "    OK: $lib -> $(echo $FOUND | sed 's|/mnt/rootfs||')"
              else
                echo "    MISSING: $lib"
              fi
            done
          else
            echo "  WARNING: No Mesa packages downloaded, GPU acceleration will be unavailable"
            echo "  Users can install manually: apt install libgl1-mesa-dri mesa-utils"
          fi

          cd $GITHUB_WORKSPACE
          # 清理 apt arm64 源 (避免影响后续步骤)
          sudo rm -f /etc/apt/sources.list.d/arm64-ports.list
          sudo dpkg --remove-architecture arm64 2>/dev/null || true

          # 设置脚本权限
          sudo chmod 755 /mnt/rootfs/usr/local/bin/fix-gxl-eth.sh 2>/dev/null
          sudo chmod 755 /mnt/rootfs/usr/local/bin/eth-monitor.sh 2>/dev/null
          sudo chmod 755 /mnt/rootfs/usr/local/bin/mac-setup.sh 2>/dev/null
          sudo chmod 755 /mnt/rootfs/usr/local/bin/first-boot-check.sh 2>/dev/null
          # V6: WiFi 脚本权限
          sudo chmod 755 /mnt/rootfs/usr/local/bin/wifi-setup.sh 2>/dev/null
          sudo chmod 755 /mnt/rootfs/usr/local/bin/wifi-connect.sh 2>/dev/null
          # V6.1: 系统优化脚本权限
          sudo chmod 755 /mnt/rootfs/usr/local/bin/optimize-system.sh 2>/dev/null
          # V6.4: GPU 驱动脚本权限
          sudo chmod 755 /mnt/rootfs/usr/local/bin/gpu-setup.sh 2>/dev/null

          # 启用 systemd 服务 (创建符号链接)
          sudo mkdir -p /mnt/rootfs/etc/systemd/system/multi-user.target.wants
          sudo ln -sf /etc/systemd/system/fix-gxl-eth.service \
            /mnt/rootfs/etc/systemd/system/multi-user.target.wants/fix-gxl-eth.service
          sudo ln -sf /etc/systemd/system/eth-monitor.service \
            /mnt/rootfs/etc/systemd/system/multi-user.target.wants/eth-monitor.service
          sudo ln -sf /etc/systemd/system/mac-setup.service \
            /mnt/rootfs/etc/systemd/system/multi-user.target.wants/mac-setup.service
          sudo ln -sf /etc/systemd/system/first-boot-check.service \
            /mnt/rootfs/etc/systemd/system/multi-user.target.wants/first-boot-check.service
          # V6: WiFi 自动检测服务
          sudo ln -sf /etc/systemd/system/wifi-setup.service \
            /mnt/rootfs/etc/systemd/system/multi-user.target.wants/wifi-setup.service
          # V6.1: 系统优化服务
          sudo ln -sf /etc/systemd/system/system-optimization.service \
            /mnt/rootfs/etc/systemd/system/multi-user.target.wants/system-optimization.service
          # V6.4: GPU 驱动加载服务
          sudo ln -sf /etc/systemd/system/gpu-setup.service \
            /mnt/rootfs/etc/systemd/system/multi-user.target.wants/gpu-setup.service
          echo "Systemd services enabled"

          # 优化 fstab (ophub 通常已优化, 仅在未优化时处理)
          if [ -f /mnt/rootfs/etc/fstab ]; then
            echo "=== fstab ==="
            cat /mnt/rootfs/etc/fstab
            if ! grep -q "commit=600" /mnt/rootfs/etc/fstab 2>/dev/null; then
              sudo sed -i 's|errors=remount-ro|errors=remount-ro,noatime,nodiratime,commit=600|g' /mnt/rootfs/etc/fstab 2>/dev/null
              echo "fstab optimized"
            else
              echo "fstab already optimized"
            fi
          fi

          # 设置配置文件权限
          sudo chmod 644 /mnt/rootfs/etc/NetworkManager/conf.d/10-eth-managed.conf 2>/dev/null
          # V6: WiFi NetworkManager 配置
          sudo chmod 644 /mnt/rootfs/etc/NetworkManager/conf.d/20-wifi-managed.conf 2>/dev/null
          sudo chmod 644 /mnt/rootfs/etc/sysctl.d/99-gxl-network.conf 2>/dev/null
          sudo chmod 644 /mnt/rootfs/etc/systemd/system/*.service 2>/dev/null

          # 验证注入的文件 (使用 sudo 避免 /dev/null 权限问题)
          # V6.4.1 fix: 确保 /dev/null 权限正确 (sudo/chroot 操作可能破坏)
          sudo chmod 666 /dev/null 2>/dev/null || true
          echo "=== Injected files verification ==="
          sudo ls -la /mnt/rootfs/usr/local/bin/fix-gxl-eth.sh || echo "MISSING: fix-gxl-eth.sh"
          sudo ls -la /mnt/rootfs/usr/local/bin/eth-monitor.sh || echo "MISSING: eth-monitor.sh"
          sudo ls -la /mnt/rootfs/usr/local/bin/mac-setup.sh || echo "MISSING: mac-setup.sh"
          sudo ls -la /mnt/rootfs/usr/local/bin/first-boot-check.sh || echo "MISSING: first-boot-check.sh"
          sudo ls -la /mnt/rootfs/etc/systemd/system/fix-gxl-eth.service || echo "MISSING: fix-gxl-eth.service"
          # V6: WiFi 文件验证
          sudo ls -la /mnt/rootfs/usr/local/bin/wifi-setup.sh || echo "MISSING: wifi-setup.sh"
          sudo ls -la /mnt/rootfs/usr/local/bin/wifi-connect.sh || echo "MISSING: wifi-connect.sh"
          sudo ls -la /mnt/rootfs/etc/systemd/system/wifi-setup.service || echo "MISSING: wifi-setup.service"
          sudo ls -la /mnt/rootfs/lib/firmware/ssv6051-sw.bin || echo "MISSING: ssv6051-sw.bin"
          sudo ls -la /mnt/rootfs/etc/NetworkManager/conf.d/20-wifi-managed.conf || echo "MISSING: 20-wifi-managed.conf"
          # V6.1: 系统优化文件验证
          sudo ls -la /mnt/rootfs/usr/local/bin/optimize-system.sh || echo "MISSING: optimize-system.sh"
          sudo ls -la /mnt/rootfs/etc/systemd/system/system-optimization.service || echo "MISSING: system-optimization.service"
          sudo ls -la /mnt/rootfs/etc/logrotate.d/b860av21-scripts || echo "MISSING: logrotate config"
          # V6.4: GPU 文件验证
          sudo ls -la /mnt/rootfs/usr/local/bin/gpu-setup.sh || echo "MISSING: gpu-setup.sh"
          sudo ls -la /mnt/rootfs/etc/systemd/system/gpu-setup.service || echo "MISSING: gpu-setup.service"
          sudo ls -la /mnt/rootfs/etc/modules-load.d/lima.conf || echo "MISSING: lima.conf"
          sudo ls -la /mnt/rootfs/usr/lib/aarch64-linux-gnu/dri/lima_dri.so 2>/dev/null || echo "MISSING: lima_dri.so (Mesa)"
          sudo ls -la /mnt/rootfs/etc/systemd/system/multi-user.target.wants/

          # 同步并卸载 (关键操作: 失败则退出)
          sudo sync
          if ! sudo umount /mnt/rootfs; then
            echo "ERROR: Failed to unmount rootfs, retrying..."
            sudo umount -l /mnt/rootfs
          fi
          echo "Rootfs unmounted"

          # V4 修复: 恢复 /dev/null 权限 (sudo 操作可能破坏 /dev/null 权限)
          # 注意: 不能用 2>/dev/null 因为 /dev/null 本身就是坏的
          sudo chmod 666 /dev/null || true

          # 重新缩小 rootfs
          sudo e2fsck -fy system.PARTITION 2>&1 | tail -3
          sudo resize2fs -M system.PARTITION 2>&1
          BLOCKS=$(sudo dumpe2fs -h system.PARTITION 2>&1 | grep 'Block count' | awk '{print $3}')
          BLKSIZE=$(sudo dumpe2fs -h system.PARTITION 2>&1 | grep 'Block size' | awk '{print $3}')
          FILE_SIZE=$((BLOCKS * BLKSIZE))
          echo "Rootfs shrunk: BLOCKS=$BLOCKS BLKSIZE=$BLKSIZE FILE_SIZE=$FILE_SIZE"
          # V4 安全检查: 确保 FILE_SIZE 非零, 防止 truncate -s 0 截断文件
          if [ -n "$FILE_SIZE" ] && [ "$FILE_SIZE" -gt 0 ]; then
            truncate -s $FILE_SIZE system.PARTITION
          else
            echo "ERROR: FILE_SIZE=$FILE_SIZE is invalid, skipping truncate to preserve data"
          fi
          echo "=== Final system.PARTITION (with network scripts) ==="
          ls -lh system.PARTITION
          echo "=== Inject step complete ==="

      # ========== 打包完整线刷镜像 ==========
      - name: Pack complete Amlogic burn image
        id: pack
        run: |
          set -e
          mkdir -p burn-image

          # 构建日期和版本号
          BUILD_DATE=$(date +%Y%m%d)
          IMAGE_NAME="b860av21-armbian-burn-${BUILD_VERSION}.${BUILD_DATE}-${OPHUB_SOC}"
          echo "image_name=$IMAGE_NAME" >> $GITHUB_OUTPUT
          echo "build_date=$BUILD_DATE" >> $GITHUB_OUTPUT
          echo "Building image: $IMAGE_NAME"

          # 烧录组件
          cp DDR.USB burn-image/
          cp UBOOT.USB burn-image/
          cp bootloader.PARTITION burn-image/
          cp boot.PARTITION burn-image/
          cp system.PARTITION burn-image/

          # 线刷配置文件
          printf ';\n;Amlogic sdcard burning configure script\n;\n[common]\nerase_bootloader    = 1\nerase_flash         = 1\nreboot              = 0\n\n[burn_ex]\npackage     = aml_upgrade_package.img\n' > burn-image/aml_sdc_burn.ini

          printf 'Platform: gxl\nDDRLoad: 0xd9000000\nDDRRun: 0xd9000030\nUboot_down: 0x10000000\nUboot_decomp: 0x10000000\nUboot_enc_down: 0xd9000000\nUboot_enc_run: 0xd9000030\nUbootLoad: 0x10000000\nUbootRun: 0x10000000\n' > burn-image/platform.conf

          printf '[LIST_NORMAL]\nfile="DDR.USB"\t\t\tmain_type="USB"\t\tsub_type="DDR"\nfile="UBOOT.USB"\t\t\tmain_type="USB"\t\tsub_type="UBOOT"\nfile="aml_sdc_burn.ini"\t\tmain_type="ini"\t\tsub_type="aml_sdc_burn"\nfile="platform.conf"\t\tmain_type="conf"\tsub_type="platform"\n\n[LIST_VERIFY]\nfile="bootloader.PARTITION"\tmain_type="PARTITION"\tsub_type="bootloader"\nfile="boot.PARTITION"\t\tmain_type="PARTITION"\tsub_type="boot"\nfile="system.PARTITION"\t\tmain_type="PARTITION"\tsub_type="data"\n' > burn-image/image.cfg

          echo "=== Packing burn image ==="
          qemu-i386 aml_image_v2_packer -r burn-image/image.cfg burn-image \
            ${IMAGE_NAME}.img

          echo "=== Final burn image ==="
          ls -lh ${IMAGE_NAME}.img

          # 压缩
          echo "=== Compressing ==="
          gzip -c ${IMAGE_NAME}.img > ${IMAGE_NAME}.img.gz
          gzip -c boot.PARTITION > boot.fat32.gz
          gzip -c system.PARTITION > rootfs.ext4.gz
          ls -lh ${IMAGE_NAME}.img.gz boot.fat32.gz rootfs.ext4.gz

      # ========== 上传 Artifact ==========
      - name: Prepare artifacts
        run: |
          IMAGE_NAME="${{ steps.pack.outputs.image_name }}"
          mkdir -p artifacts
          cp ${IMAGE_NAME}.img.gz artifacts/
          cp ${IMAGE_NAME}.img artifacts/ 2>/dev/null || true
          cp boot.fat32.gz artifacts/
          cp rootfs.ext4.gz artifacts/
          cp bootloader.PARTITION artifacts/

          # 校验文件
          cd artifacts
          md5sum *.gz bootloader.PARTITION > checksums.md5
          cat checksums.md5
          ls -lh

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.pack.outputs.image_name }}
          path: artifacts/
          retention-days: 30
          compression-level: 0

      # ========== 创建 Release ==========
      - name: Create GitHub Release
        if: github.event.inputs.create_release != 'false'
        run: |
          # V4 修复: 恢复 /dev/null 权限 (上一步 sudo 操作可能破坏)
          sudo chmod 666 /dev/null || true

          IMAGE_NAME="${{ steps.pack.outputs.image_name }}"
          BUILD_DATE="${{ steps.pack.outputs.build_date }}"
          TAG="v6.4.${BUILD_DATE}-${OPHUB_SOC}-$(echo $GITHUB_SHA | cut -c1-7)"
          echo "Creating release: $TAG"
          echo "Image name: $IMAGE_NAME"

          # 获取 rootfs UUID
          ROOT_UUID=$(sudo dumpe2fs -h system.PARTITION 2>&1 | grep -oP 'UUID:\s+\K[a-f0-9-]+' || echo "unknown")

          # 生成 release notes 文件 (精简版)
          cat > /tmp/release-notes.md << 'RNOTES'
          ## B860AV2.1-A Armbian 线刷镜像 V6.4

          **内核 6.1.177 LTS · GPU 加速 · WiFi 内置 · eMMC 定制 · U-Boot Logo**

          ### 主要特性
          - **GPU 加速**: Mali-450 lima 开源驱动 + Mesa 用户空间驱动 (OpenGL ES 2.0)
          - **内核**: 6.1.177 LTS (锁定, ophub stable config-6.1, lima 模块已启用)
          - **WiFi**: SSV6051/UWE5622/MT7601U 固件内置, 一键连接助手 `wifi-connect.sh`
          - **eMMC**: 定制 DTB 降至 50MHz (适配国产 eMMC), 含 3 个备选 DTB
          - **网络**: GXL 以太网 PHY 修复 + 链路监控 + MAC 设置
          - **系统**: zram swap + CPU 调频 + tmpfs + eMMC 写入保护
          - **启动**: U-Boot BMP Logo 消除黑屏 + 首启自动验证修复

          ### 线刷方法
          1. 下载 `.img.gz` 并 `gunzip` 解压
          2. Amlogic USB Burning Tool v2.1.6 导入 `.img`
          3. **勾选** Erase Flash + Verify Flash, **不勾** Preserve User Data
          4. 点 Start, OTG 口线刷, 等待 100% 绿色

          ### 启动后验证
          ```
          # GPU 驱动状态
          cat /var/log/gpu-setup.log
          lsmod | grep lima && ls /dev/dri/

          # WiFi 连接
          wifi-connect.sh "WiFi名" "密码"

          # eMMC 速度
          cat /sys/kernel/debug/mmc*/ios 2>/dev/null | grep -E "timing|clock"
          ```

          ### DTB 切换
          编辑 boot 分区 `uEnv.txt` 中的 FDT 行:
          - `meson-gxl-s905l3b-b860av21.dtb` — 定制 50MHz (默认)
          - `meson-gxl-s905l3b-e900v22e.dtb` — ophub 通用 200MHz
          - `meson-gxl-s905l3b-m302a.dtb` — M302A 备选
          RNOTES

          echo "" >> /tmp/release-notes.md
          echo "### 构建信息" >> /tmp/release-notes.md
          echo "- 构建时间: $(date -u '+%Y-%m-%d %H:%M UTC')" >> /tmp/release-notes.md
          echo "- 版本: V6.4 (内核 6.1.y LTS + WiFi + 定制 DTB + eMMC 50MHz + 系统优化 + U-Boot Logo + GPU 加速)" >> /tmp/release-notes.md
          echo "- U-Boot: ${UBOOT_VERSION} (主线, p212_defconfig)" >> /tmp/release-notes.md
          echo "- ophub SoC: ${OPHUB_SOC}" >> /tmp/release-notes.md
          echo "- 内核版本: ${KERNEL_VERSION}.y (LTS, 锁定)" >> /tmp/release-notes.md
          echo "- GPU: Mali-450 + lima 驱动 (CONFIG_DRM_LIMA=m) + Mesa 用户空间驱动" >> /tmp/release-notes.md
          echo "- 默认 DTB: meson-gxl-s905l3b-b860av21.dtb (eMMC 50MHz)" >> /tmp/release-notes.md
          echo "- WiFi 固件: SSV6051 (内置) + UWE5622 (ophub内置) + MT7601U (ophub内置)" >> /tmp/release-notes.md
          echo "- Root UUID: ${ROOT_UUID}" >> /tmp/release-notes.md
          echo "- Git SHA: ${GITHUB_SHA::7}" >> /tmp/release-notes.md
          echo "- 镜像名称: $IMAGE_NAME.img.gz" >> /tmp/release-notes.md

          gh release create "$TAG" \
            --title "B860AV2.1-A Armbian V6.4 $(date +%Y-%m-%d)" \
            --notes-file /tmp/release-notes.md \
            artifacts/${IMAGE_NAME}.img.gz \
